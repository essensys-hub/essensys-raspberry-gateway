name: NixOS flake check

on:
  push:
    branches: [nixos]
  pull_request:
    branches: [nixos]

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout essensys-nginx sibling
        uses: actions/checkout@v4
        with:
          repository: essensys-hub/essensys-nginx
          path: essensys-nginx

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Flake check
        run: |
          nix flake check --override-input essensys-nginx path:./essensys-nginx

  cross-build-aarch64:
    runs-on: ubuntu-latest
    needs: flake-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: essensys-hub/essensys-nginx
          path: essensys-nginx

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Build gateway-cm5 system (aarch64)
        run: |
          nix build .#nixosConfigurations.gateway-cm5.config.system.build.toplevel \
            --system aarch64-linux \
            --override-input essensys-nginx path:./essensys-nginx \
            --max-jobs 2
