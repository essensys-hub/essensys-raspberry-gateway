name: Deploy MkDocs (Gateway)

on:
  push:
    branches:
      - master
      - main
      - nixos
      - 'V.*'
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mike-deploy-gateway
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs-material[imaging]
          pip install mkdocs-minify-plugin
          pip install mkdocs-git-revision-date-localized-plugin
          pip install pymdown-extensions
          pip install mike

      - name: Setup Node.js for Mermaid
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Determine version alias
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "master" ] || [ "$BRANCH" = "main" ]; then
            echo "alias=latest" >> "$GITHUB_OUTPUT"
          else
            echo "alias=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy with mike
        run: mike deploy --push --update-aliases ${{ steps.version.outputs.alias }}

      - name: Set default version
        run: mike set-default --push ${{ steps.version.outputs.alias }}
